name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod download
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod download
      - name: Unit tests
        run: go test ./tests/unit/ -v -count=1 -timeout 30s
      - name: Integration tests
        run: go test ./tests/integration/ -v -count=1 -timeout 60s
      - name: Coverage check (≥70%)
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -timeout 90s
          go tool cover -func=coverage.out | awk '/^total:/{pct=$3+0; if(pct<70){printf "Coverage %.1f%% is below 70%% threshold\n",pct; exit 1}}'

  race:
    name: Race Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod download
      - run: go test ./tests/... -race -count=1 -timeout 60s

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod download
      - run: go test ./tests/benchmark/ -bench=. -benchmem -count=3 -timeout 120s

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod download
      - run: go build -o bin/server ./cmd/server
      - run: go build -o bin/cli ./cmd/cli

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test, race, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Tag version
        id: tag
        run: |
          COUNT=$(git rev-list --count HEAD)
          TAG="v0.1.${COUNT}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
